<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Krish - Book Run</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:manipulation; font-family:Arial,sans-serif; }
    #gameContainer { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; }
    canvas { width:100%; height:100%; max-width:420px; max-height:740px; background:#70C5CF; display:block; }
    @media (max-width:600px) { canvas { max-width:none; width:100%; height:100%; } }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // ====== RESIZE (fixed ratio)
    const BASE_W = 288;
    const BASE_H = 512;
    let WIDTH = BASE_W, HEIGHT = BASE_H;

    function resize() {
      const ratio = BASE_W / BASE_H;
      const w = window.innerWidth;
      const h = window.innerHeight;

      if (w / h > ratio) {
        canvas.height = h;
        canvas.width = Math.floor(h * ratio);
      } else {
        canvas.width = w;
        canvas.height = Math.floor(w / ratio);
      }
      WIDTH = canvas.width;
      HEIGHT = canvas.height;
    }
    window.addEventListener("resize", resize);
    resize();

    // ====== GAME TUNING
    const GROUND_HEIGHT = 112;
    const GAP = 155;
    const BOOK_PIPE_WIDTH = 62;         // thicker than normal pipe
    const FACE_SIZE = 44;               // bird size (your face)
    const GRAVITY = 0.38;
    const FLAP_VELOCITY = -7.7;
    const SCROLL_SPEED = 2.0;
    const TARGET_FPS = 60;
    const WIN_SCORE = 20;

    // ====== FACE IMAGE (bird)
    const faceImg = new Image();
    faceImg.src = "face.png";
    let faceReady = false;
    faceImg.onload = () => (faceReady = true);

    // ====== SOUND POOLS (so hit/fall can overlap)
    function makeSoundPool(src, voices = 3, volume = 1) {
      const pool = [];
      for (let i = 0; i < voices; i++) {
        const a = new Audio(src);
        a.preload = "auto";
        a.volume = volume;
        pool.push(a);
      }
      let index = 0;
      return {
        play() {
          const a = pool[index];
          index = (index + 1) % pool.length;
          try { a.currentTime = 0; a.play().catch(() => {}); } catch {}
        },
        all: pool
      };
    }

    // Background music (single audio, loop)
    const bgm = new Audio("sounds/bg.mp3");
    bgm.loop = true;
    bgm.preload = "auto";
    bgm.volume = 0.35;

    const sounds = {
      hit:  makeSoundPool("sounds/hit.mp3", 4, 1.0),
      fall: makeSoundPool("sounds/fall.mp3", 4, 1.0),
      win:  makeSoundPool("sounds/win.mp3", 2, 1.0)
    };

    function playSound(id) {
      if (sounds[id]) sounds[id].play();
    }

    // Autoplay unlock (needed on mobile)
    let audioUnlocked = false;
    function unlockAudioAndMusic() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // unlock SFX pools
      const allAudios = Object.values(sounds).flatMap(s => s.all);
      allAudios.forEach(a => {
        try {
          a.muted = true;
          a.play().then(() => {
            a.pause();
            a.currentTime = 0;
            a.muted = false;
          }).catch(() => { a.muted = false; });
        } catch {}
      });

      // start background music
      try {
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
      } catch {}
    }

    // ====== GAME STATE
    let gameState = "menu"; // menu | playing | dead | win
    let deathReason = "";   // "hit" | "fall"
    let lastTime = performance.now();

    let score = 0;
    let best = 0;

    let bird = { x: 0, y: 0, vy: 0 };
    let pipes = []; // each: { x, topH, scored }

    let groundx1 = 0;
    let groundx2 = 0;

    function resetGame() {
      bird = { x: WIDTH * 0.27, y: HEIGHT / 2.7, vy: 0 };
      pipes = [];
      score = 0;
      deathReason = "";
      groundx1 = 0;
      groundx2 = WIDTH * 1.17;
    }

    function startGame() {
      resetGame();
      gameState = "playing";
      lastTime = performance.now();
    }

    // ====== INPUT
    function flap() {
      unlockAudioAndMusic();
      if (gameState === "playing") {
        bird.vy = FLAP_VELOCITY; // NO flap sound (as you wanted)
      } else {
        startGame();
      }
    }

    canvas.addEventListener("click", flap);
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, { passive: false });
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        flap();
      }
    });

    // ====== DRAW HELPERS
    function drawCircleImage(img, cx, cy, size, border = true) {
      const r = size / 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, size, size);
      ctx.restore();

      if (border) {
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = Math.max(2, size * 0.06);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Draw a "book stack" pipe (top + bottom) instead of green pipes
    function drawBookPipe(x, topH) {
      const botY = topH + GAP;
      const playAreaH = HEIGHT - GROUND_HEIGHT;

      // book colors rotate by position for variety
      const palette = ["#E4572E", "#17BEBB", "#FFC914", "#2E282A", "#76B041", "#3D5A80", "#EE6C4D"];
      const spineLine = "rgba(255,255,255,0.35)";

      function drawStack(y, h) {
        // base shadow
        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillRect(x + 3, y + 3, BOOK_PIPE_WIDTH, h);

        // main stack background
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        ctx.fillRect(x, y, BOOK_PIPE_WIDTH, h);

        // draw "books" as horizontal slices
        const bookH = 18;
        let yy = y;
        let i = 0;
        while (yy < y + h) {
          const bh = Math.min(bookH, (y + h) - yy);
          ctx.fillStyle = palette[(Math.floor((x + yy) / 20) + i) % palette.length];
          ctx.fillRect(x, yy, BOOK_PIPE_WIDTH, bh);

          // spine lines / details
          ctx.fillStyle = spineLine;
          ctx.fillRect(x + 8, yy + 4, BOOK_PIPE_WIDTH - 16, 2);

          // small label
          ctx.fillStyle = "rgba(0,0,0,0.22)";
          ctx.fillRect(x + 10, yy + bh - 8, 18, 4);

          yy += bh;
          i++;
        }

        // outer border
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, BOOK_PIPE_WIDTH, h);
      }

      // TOP stack from 0 -> topH
      drawStack(0, topH);

      // BOTTOM stack from botY -> playAreaH
      drawStack(botY, playAreaH - botY);

      // small "bookmark cap" at the gap edges (looks cool)
      ctx.fillStyle = "rgba(255,255,255,0.22)";
      ctx.fillRect(x - 6, topH - 10, BOOK_PIPE_WIDTH + 12, 10);
      ctx.fillRect(x - 6, botY, BOOK_PIPE_WIDTH + 12, 10);
    }

    function drawBirdFace() {
      const rot = Math.min(Math.max(bird.vy * 0.07, -1.1), 0.6);

      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(rot);

      if (faceReady) {
        drawCircleImage(faceImg, 0, 0, FACE_SIZE, true);
      } else {
        // fallback if image not loaded yet
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(0, 0, FACE_SIZE / 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // ====== COLLISION (circle vs rectangle)
    function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx * dx + dy * dy) <= r * r;
    }

    // ====== UPDATE
    function update(deltaMs) {
      if (gameState !== "playing") return;

      const dt = (deltaMs * TARGET_FPS) / 1000;

      // bird
      bird.vy += GRAVITY * dt;
      bird.y += bird.vy * dt;

      // ground scroll (visual only)
      groundx1 -= SCROLL_SPEED * dt;
      groundx2 -= SCROLL_SPEED * dt;
      if (groundx1 <= -WIDTH * 1.17) groundx1 = WIDTH * 1.17;
      if (groundx2 <= -WIDTH * 1.17) groundx2 = 0;

      // spawn pipes
      if (pipes.length === 0 || pipes[pipes.length - 1].x < WIDTH - 220) {
        const topH = 70 + Math.random() * 200;
        pipes.push({ x: WIDTH + 60, topH, scored: false });
      }

      // move + collision
      const birdR = FACE_SIZE * 0.42;

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= SCROLL_SPEED * dt;

        if (p.x < -BOOK_PIPE_WIDTH - 50) {
          pipes.splice(i, 1);
          continue;
        }

        if (!p.scored && p.x + BOOK_PIPE_WIDTH < bird.x) {
          p.scored = true;
          score++;
          if (score > best) best = score;
        }

        const botY = p.topH + GAP;
        const playAreaH = HEIGHT - GROUND_HEIGHT;

        // collide with TOP book stack
        if (circleRectCollide(bird.x, bird.y, birdR, p.x, 0, BOOK_PIPE_WIDTH, p.topH)) {
          gameState = "dead";
          deathReason = "hit";
          playSound("hit");
          return;
        }

        // collide with BOTTOM book stack
        if (circleRectCollide(bird.x, bird.y, birdR, p.x, botY, BOOK_PIPE_WIDTH, playAreaH - botY)) {
          gameState = "dead";
          deathReason = "hit";
          playSound("hit");
          return;
        }
      }

      // fall/top out
      if (bird.y + birdR > HEIGHT - GROUND_HEIGHT || bird.y - birdR < 0) {
        gameState = "dead";
        deathReason = "fall";
        playSound("fall");
        return;
      }

      // win
      if (score >= WIN_SCORE) {
        gameState = "win";
        playSound("win");
      }
    }

    // ====== DRAW
    function drawBackground() {
      // sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT - GROUND_HEIGHT);
      grad.addColorStop(0, "#71C5CF");
      grad.addColorStop(1, "#C6F2F7");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // subtle clouds
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      for (let i = 0; i < 6; i++) {
        const cx = (i * 70 + (Date.now() / 50) % 70) % (WIDTH + 80) - 40;
        const cy = 60 + (i % 3) * 35;
        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI * 2);
        ctx.arc(cx + 18, cy + 4, 16, 0, Math.PI * 2);
        ctx.arc(cx + 34, cy, 14, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      // ground strip
      ctx.fillStyle = "#E8D9A9";
      ctx.fillRect(groundx1, HEIGHT - GROUND_HEIGHT, WIDTH * 1.17, GROUND_HEIGHT);
      ctx.fillRect(groundx2, HEIGHT - GROUND_HEIGHT, WIDTH * 1.17, GROUND_HEIGHT);

      // little lines like tiles
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      for (let x = 0; x < WIDTH; x += 24) {
        ctx.fillRect(x, HEIGHT - 40, 10, 4);
      }
    }

    function drawUIOverlay() {
      // score
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 4;
      ctx.font = "bold 58px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.strokeText(score, WIDTH / 2, 95);
      ctx.fillText(score, WIDTH / 2, 95);

      if (gameState === "playing") return;

      // overlay box
      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      if (gameState === "menu") {
        ctx.font = "bold 44px Arial";
        ctx.fillText("BOOK FLAPPY", WIDTH / 2, HEIGHT / 2 - 120);

        ctx.font = "bold 28px Arial";
        ctx.fillText("KRISH EDITION", WIDTH / 2, HEIGHT / 2 - 78);

        ctx.font = "24px Arial";
        ctx.fillText("Tap / Space to Start", WIDTH / 2, HEIGHT / 2 + 10);

        ctx.font = "22px Arial";
        ctx.fillText("Background music will start after your first tap", WIDTH / 2, HEIGHT / 2 + 50);
      }

      if (gameState === "dead") {
        ctx.font = "bold 46px Arial";
        ctx.fillText("GAME OVER", WIDTH / 2, HEIGHT / 2 - 70);

        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score}  |  Best: ${best}`, WIDTH / 2, HEIGHT / 2 - 20);

        ctx.font = "24px Arial";
        ctx.fillText(deathReason === "hit" ? "You hit the books!" : "You fell!", WIDTH / 2, HEIGHT / 2 + 18);

        ctx.font = "26px Arial";
        ctx.fillText("Tap to Retry", WIDTH / 2, HEIGHT / 2 + 70);
      }

      if (gameState === "win") {
        ctx.font = "bold 50px Arial";
        ctx.fillText("YOU WIN!", WIDTH / 2, HEIGHT / 2 - 70);

        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score}  |  Best: ${best}`, WIDTH / 2, HEIGHT / 2 - 20);

        ctx.font = "26px Arial";
        ctx.fillText("Tap to Play Again", WIDTH / 2, HEIGHT / 2 + 70);
      }
    }

    function draw() {
      drawBackground();

      // pipes (books)
      pipes.forEach(p => drawBookPipe(p.x, p.topH));

      drawGround();

      // bird (face)
      drawBirdFace();

      drawUIOverlay();
    }

    // ====== LOOP
    resetGame();

    function loop(now) {
      const delta = now - lastTime;
      lastTime = now;

      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
