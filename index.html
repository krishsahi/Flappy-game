<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Krish - Real Books</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:manipulation; font-family:Arial,sans-serif; }
    #gameContainer { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; }
    canvas { width:100%; height:100%; max-width:420px; max-height:740px; background:#70C5CF; display:block; }
    #hud {
      position: fixed; left: 12px; top: 12px; right: 12px;
      color: #fff; font: 14px/1.3 Arial, sans-serif;
      background: rgba(0,0,0,0.35); padding: 10px 12px; border-radius: 12px;
      pointer-events: none; white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas"></canvas>
  </div>
  <div id="hud">Loading assets…</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    // ====== RESIZE (fixed ratio)
    const BASE_W = 288;
    const BASE_H = 512;
    let WIDTH = BASE_W, HEIGHT = BASE_H;

    function resize() {
      const ratio = BASE_W / BASE_H;
      const w = window.innerWidth;
      const h = window.innerHeight;

      if (w / h > ratio) {
        canvas.height = h;
        canvas.width = Math.floor(h * ratio);
      } else {
        canvas.width = w;
        canvas.height = Math.floor(w / ratio);
      }
      WIDTH = canvas.width;
      HEIGHT = canvas.height;
    }
    window.addEventListener("resize", resize);
    resize();

    // ====== GAME TUNING
    const GROUND_HEIGHT = 112;
    const GAP = 160;
    const PIPE_W = 70;          // real-books pipe width
    const GRAVITY = 0.38;
    const FLAP_VEL = -7.7;
    const SPEED = 2.0;
    const TARGET_FPS = 60;
    const WIN_SCORE = 20;

    const BIRD_BODY_R = 18;     // collision radius
    const FACE_SIZE = 38;       // face overlay size

    // ====== SAFE ASSET LOADING
    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ ok:true, img, src });
        img.onerror = () => resolve({ ok:false, img:null, src });
        img.src = src;
      });
    }

    function makeSoundPool(src, voices = 3, volume = 1) {
      const pool = [];
      for (let i = 0; i < voices; i++) {
        const a = new Audio(src);
        a.preload = "auto";
        a.volume = volume;
        pool.push(a);
      }
      let idx = 0;
      return {
        src,
        pool,
        play() {
          const a = pool[idx];
          idx = (idx + 1) % pool.length;
          try { a.currentTime = 0; a.play().catch(() => {}); } catch {}
        }
      };
    }

    // ====== ASSETS (paths MUST match repo exactly)
    const PATHS = {
      face: "face.png",
      books: "img/books.png",
      bgm: "sounds/bg.mp3",
      hit: "sounds/hit.mp3",
      fall: "sounds/fall.mp3",
      win: "sounds/win.mp3"
    };

    let faceImg = null;
    let booksImg = null;
    let booksPattern = null;

    // Audio
    const bgm = new Audio(PATHS.bgm);
    bgm.loop = true;
    bgm.preload = "auto";
    bgm.volume = 0.35;

    const sfx = {
      hit:  makeSoundPool(PATHS.hit, 4, 1.0),
      fall: makeSoundPool(PATHS.fall, 4, 1.0),
      win:  makeSoundPool(PATHS.win, 2, 1.0),
    };

    function playSfx(name) {
      if (sfx[name]) sfx[name].play();
    }

    // unlock audio on first user gesture (required on mobile)
    let audioUnlocked = false;
    async function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // unlock sfx voices
      const all = Object.values(sfx).flatMap(s => s.pool);
      for (const a of all) {
        try {
          a.muted = true;
          await a.play().catch(() => {});
          a.pause();
          a.currentTime = 0;
          a.muted = false;
        } catch {}
      }

      // start bgm
      try {
        bgm.currentTime = 0;
        await bgm.play().catch(() => {});
      } catch {}
    }

    document.addEventListener("pointerdown", () => unlockAudio(), { once: true });
    document.addEventListener("keydown", () => unlockAudio(), { once: true });

    // ====== GAME STATE
    let gameState = "menu"; // menu | playing | dead | win
    let deathReason = "";   // hit | fall
    let lastTime = performance.now();

    let score = 0, best = 0;
    let bird = { x: 0, y: 0, vy: 0 };
    let pipes = [];

    let groundx1 = 0;
    let groundx2 = 0;

    function resetGame() {
      bird = { x: WIDTH * 0.27, y: HEIGHT / 2.7, vy: 0 };
      pipes = [];
      score = 0;
      deathReason = "";
      groundx1 = 0;
      groundx2 = WIDTH * 1.17;
    }

    function startGame() {
      resetGame();
      gameState = "playing";
      lastTime = performance.now();
    }

    // ====== INPUT
    function flap() {
      unlockAudio();
      if (gameState === "playing") bird.vy = FLAP_VEL; // no flap sound (as you wanted)
      else startGame();
    }

    canvas.addEventListener("click", flap);
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, { passive:false });
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); flap(); }
    });

    // ====== DRAW HELPERS
    function drawCircleImage(img, cx, cy, size, border = true) {
      const r = size / 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, size, size);
      ctx.restore();

      if (border) {
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = Math.max(2, size * 0.06);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx*dx + dy*dy) <= r*r;
    }

    // ====== REAL BOOK PIPES (image pattern fill)
    function drawBookPipe(x, topH) {
      const botY = topH + GAP;
      const playH = HEIGHT - GROUND_HEIGHT;

      // if books image missing, fallback rectangle (won't crash)
      if (!booksPattern) {
        ctx.fillStyle = "rgba(0,0,0,0.20)";
        ctx.fillRect(x, 0, PIPE_W, topH);
        ctx.fillRect(x, botY, PIPE_W, playH - botY);
        return;
      }

      function fillStack(y, h) {
        // shadow
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(x + 6, y + 6, PIPE_W, h);

        // clip stack rect then fill with repeating books texture
        ctx.save();
        ctx.beginPath();
        ctx.rect(x, y, PIPE_W, h);
        ctx.clip();

        ctx.fillStyle = booksPattern;

        // offset texture so stacks look different
        const ox = (x * 0.7) % 120;
        const oy = (y * 0.6) % 120;
        ctx.translate(-ox, -oy);
        ctx.fillRect(x + ox, y + oy, PIPE_W + 200, h + 200);

        ctx.restore();

        // border
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, PIPE_W, h);

        // highlight edge
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + 2, y + 2);
        ctx.lineTo(x + 2, y + h - 2);
        ctx.stroke();
      }

      fillStack(0, topH);
      fillStack(botY, playH - botY);

      // “lip” at gap edges
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(x - 8, topH - 12, PIPE_W + 16, 12);
      ctx.fillRect(x - 8, botY, PIPE_W + 16, 12);
    }

    // ====== BIRD LOOKS LIKE BIRD + FACE OVERLAY
    function drawBirdWithFace() {
      const rot = Math.min(Math.max(bird.vy * 0.07, -1.1), 0.6);

      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(rot);

      // body
      const g = ctx.createLinearGradient(-20, -10, 22, 14);
      g.addColorStop(0, "#FFD54A");
      g.addColorStop(1, "#F39C12");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, 20, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // wing
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.beginPath();
      ctx.ellipse(-4, 3, 12, 8, -0.25, 0, Math.PI * 2);
      ctx.fill();

      // beak
      ctx.fillStyle = "#FF7A00";
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(30, -5);
      ctx.lineTo(30, 5);
      ctx.closePath();
      ctx.fill();

      // eye
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(8, -4, 4.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(9.5, -4, 2, 0, Math.PI * 2);
      ctx.fill();

      // face overlay
      if (faceImg) drawCircleImage(faceImg, 6, -1, FACE_SIZE, true);

      ctx.restore();
    }

    // ====== UPDATE
    function update(deltaMs) {
      if (gameState !== "playing") return;

      const dt = (deltaMs * TARGET_FPS) / 1000;

      // bird
      bird.vy += GRAVITY * dt;
      bird.y += bird.vy * dt;

      // spawn pipes
      if (pipes.length === 0 || pipes[pipes.length - 1].x < WIDTH - 230) {
        const topH = 70 + Math.random() * 200;
        pipes.push({ x: WIDTH + 60, topH, scored:false });
      }

      // move pipes + collision
      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= SPEED * dt;

        if (p.x < -PIPE_W - 80) {
          pipes.splice(i, 1);
          continue;
        }

        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true;
          score++;
          if (score > best) best = score;
        }

        const botY = p.topH + GAP;
        const playH = HEIGHT - GROUND_HEIGHT;

        if (
          circleRectCollide(bird.x, bird.y, BIRD_BODY_R, p.x, 0, PIPE_W, p.topH) ||
          circleRectCollide(bird.x, bird.y, BIRD_BODY_R, p.x, botY, PIPE_W, playH - botY)
        ) {
          gameState = "dead";
          deathReason = "hit";
          playSfx("hit");
          return;
        }
      }

      // fall/top out
      if (bird.y + BIRD_BODY_R > HEIGHT - GROUND_HEIGHT || bird.y - BIRD_BODY_R < 0) {
        gameState = "dead";
        deathReason = "fall";
        playSfx("fall");
        return;
      }

      // win
      if (score >= WIN_SCORE) {
        gameState = "win";
        playSfx("win");
      }
    }

    // ====== DRAW
    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT - GROUND_HEIGHT);
      grad.addColorStop(0, "#71C5CF");
      grad.addColorStop(1, "#C6F2F7");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // clouds
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      for (let i = 0; i < 6; i++) {
        const cx = (i * 70 + (Date.now() / 50) % 70) % (WIDTH + 80) - 40;
        const cy = 60 + (i % 3) * 35;
        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI * 2);
        ctx.arc(cx + 18, cy + 4, 16, 0, Math.PI * 2);
        ctx.arc(cx + 34, cy, 14, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = "#E8D9A9";
      ctx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);

      ctx.fillStyle = "rgba(0,0,0,0.08)";
      for (let x = 0; x < WIDTH; x += 24) ctx.fillRect(x, HEIGHT - 40, 10, 4);
    }

    function drawUI() {
      // score
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 4;
      ctx.font = "bold 58px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.strokeText(score, WIDTH / 2, 95);
      ctx.fillText(score, WIDTH / 2, 95);

      if (gameState === "playing") return;

      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      if (gameState === "menu") {
        ctx.font = "bold 44px Arial";
        ctx.fillText("BOOK FLAPPY", WIDTH/2, HEIGHT/2 - 120);
        ctx.font = "24px Arial";
        ctx.fillText("Tap / Space to Start", WIDTH/2, HEIGHT/2 + 10);
        ctx.font = "20px Arial";
        ctx.fillText("Music starts after first tap", WIDTH/2, HEIGHT/2 + 48);
      } else if (gameState === "dead") {
        ctx.font = "bold 46px Arial";
        ctx.fillText("GAME OVER", WIDTH/2, HEIGHT/2 - 70);
        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score} | Best: ${best}`, WIDTH/2, HEIGHT/2 - 20);
        ctx.font = "24px Arial";
        ctx.fillText(deathReason === "hit" ? "You hit the books!" : "You fell!", WIDTH/2, HEIGHT/2 + 18);
        ctx.font = "26px Arial";
        ctx.fillText("Tap to Retry", WIDTH/2, HEIGHT/2 + 70);
      } else if (gameState === "win") {
        ctx.font = "bold 50px Arial";
        ctx.fillText("YOU WIN!", WIDTH/2, HEIGHT/2 - 70);
        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score} | Best: ${best}`, WIDTH/2, HEIGHT/2 - 20);
        ctx.font = "26px Arial";
        ctx.fillText("Tap to Play Again", WIDTH/2, HEIGHT/2 + 70);
      }
    }

    function draw() {
      drawBackground();

      // pipes
      for (const p of pipes) drawBookPipe(p.x, p.topH);

      drawGround();
      drawBirdWithFace();
      drawUI();
    }

    // ====== MAIN LOOP (crash-proof)
    function loop(now) {
      try {
        const delta = now - lastTime;
        lastTime = now;
        update(delta);
        draw();
      } catch (err) {
        hud.textContent = "Runtime error (game stopped):\n" + (err?.message || err);
        console.error(err);
        return; // stop loop
      }
      requestAnimationFrame(loop);
    }

    // ====== LOAD ASSETS THEN START
    (async function init() {
      resetGame();

      const results = await Promise.all([
        loadImage(PATHS.face),
        loadImage(PATHS.books)
      ]);

      const faceRes = results[0];
      const booksRes = results[1];

      const missing = [];
      if (faceRes.ok) faceImg = faceRes.img; else missing.push(faceRes.src);
      if (booksRes.ok) {
        booksImg = booksRes.img;
        booksPattern = ctx.createPattern(booksImg, "repeat");
      } else missing.push(booksRes.src);

      // audio debug info
      const audioInfo =
        `BGM: ${PATHS.bgm}\n` +
        `Unlocked: ${audioUnlocked ? "yes" : "no"}\n` +
        `Tip: first tap starts music`;

      if (missing.length) {
        hud.textContent =
          "Some assets are missing (still playable):\n" +
          missing.join("\n") + "\n\n" + audioInfo;
      } else {
        hud.textContent = "Ready ✅\nTap / Space to start\n\n" + audioInfo;
        setTimeout(() => { hud.style.display = "none"; }, 2500);
      }

      // if bgm path is wrong, show it clearly
      bgm.addEventListener("error", () => {
        hud.style.display = "block";
        hud.textContent =
          "BGM failed to load ❌\nCheck file path EXACT:\n" +
          PATHS.bgm + "\n\nGitHub is case-sensitive.";
      });

      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
