<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Krish - Real Books</title>
  <style>
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:manipulation; font-family:Arial,sans-serif; }
    #gameContainer { position:relative; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; }
    canvas { width:100%; height:100%; max-width:420px; max-height:740px; background:#70C5CF; display:block; }
    #hud{
      position:fixed; left:12px; top:12px; right:12px;
      color:#fff; font:14px/1.35 Arial,sans-serif;
      background:rgba(0,0,0,0.35); padding:10px 12px; border-radius:12px;
      pointer-events:none; white-space:pre-line;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="canvas"></canvas>
  </div>
  <div id="hud">Loading…</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const hud = document.getElementById("hud");

    // ====== RESIZE (fixed ratio)
    const BASE_W = 288;
    const BASE_H = 512;
    let WIDTH = BASE_W, HEIGHT = BASE_H;

    function resize() {
      const ratio = BASE_W / BASE_H;
      const w = window.innerWidth;
      const h = window.innerHeight;

      if (w / h > ratio) {
        canvas.height = h;
        canvas.width = Math.floor(h * ratio);
      } else {
        canvas.width = w;
        canvas.height = Math.floor(w / ratio);
      }
      WIDTH = canvas.width;
      HEIGHT = canvas.height;
    }
    window.addEventListener("resize", resize);
    resize();

    // ====== GAME TUNING
    const GROUND_HEIGHT = 112;
    const GAP = 160;
    const PIPE_W = 70;

    const GRAVITY = 0.38;
    const FLAP_VEL = -7.7;
    const SPEED = 2.0;
    const TARGET_FPS = 60;

    const WIN_SCORE = 20;

    const BIRD_BODY_R = 18;  // collision radius
    const FACE_SIZE = 38;    // face overlay size

    // ====== ASSET PATHS (must match repo)
    const PATHS = {
      face: "face.png",
      books: "img/books.png",
      bgm: "sounds/bg.mp3",
      hit: "sounds/hit.mp3",
      fall: "sounds/fall.mp3",
      win: "sounds/win.mp3"
    };

    // ====== SAFE LOADERS
    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve({ ok:true, img, src });
        img.onerror = () => resolve({ ok:false, img:null, src });
        img.src = src;
      });
    }

    function makeSoundPool(src, voices = 3, volume = 1) {
      const pool = [];
      for (let i = 0; i < voices; i++) {
        const a = new Audio(src);
        a.preload = "auto";
        a.volume = volume;
        pool.push(a);
      }
      let idx = 0;
      return {
        src,
        pool,
        play() {
          const a = pool[idx];
          idx = (idx + 1) % pool.length;
          try { a.currentTime = 0; a.play().catch(() => {}); } catch {}
        }
      };
    }

    // ====== AUDIO
    const bgm = new Audio(PATHS.bgm);
    bgm.loop = true;
    bgm.preload = "auto";
    bgm.volume = 0.35;

    // Mobile-safe start
    let musicStarted = false;
    function startBGM() {
      if (musicStarted) return;
      musicStarted = true;

      bgm.muted = true;
      const p = bgm.play();
      if (p) p.catch(() => { musicStarted = false; });

      setTimeout(() => {
        bgm.muted = false;
        bgm.volume = 0.35;
      }, 120);
    }

    function stopBGM(reset = true) {
      try { bgm.pause(); } catch {}
      if (reset) {
        try { bgm.currentTime = 0; } catch {}
      }
      musicStarted = false; // allow restart next round
    }

    const sfx = {
      hit:  makeSoundPool(PATHS.hit, 4, 1.0),
      fall: makeSoundPool(PATHS.fall, 4, 1.0),
      win:  makeSoundPool(PATHS.win, 2, 1.0),
    };
    function playSfx(name) { if (sfx[name]) sfx[name].play(); }

    // Start music on first gesture anywhere
    document.addEventListener("pointerdown", startBGM, { once:true });
    document.addEventListener("touchstart", startBGM, { once:true });
    document.addEventListener("keydown", startBGM, { once:true });

    // Debug if bgm fails
    bgm.addEventListener("error", () => {
      hud.style.display = "block";
      hud.textContent =
        "BGM load failed ❌\n" +
        "Check file path EXACT:\n" + PATHS.bgm + "\n\n" +
        "GitHub is case-sensitive.";
    });

    // ====== IMAGES / PATTERN
    let faceImg = null;
    let booksImg = null;
    let booksPattern = null;

    // ====== GAME STATE
    let gameState = "menu"; // menu | playing | dead | win
    let deathReason = "";   // hit | fall
    let lastTime = performance.now();

    let score = 0, best = 0;
    let bird = { x:0, y:0, vy:0 };
    let pipes = []; // {x, topH, scored, texYTop, texYBot}

    function resetGame() {
      bird = { x: WIDTH * 0.27, y: HEIGHT / 2.7, vy: 0 };
      pipes = [];
      score = 0;
      deathReason = "";
    }

    function startGame() {
      resetGame();
      gameState = "playing";
      lastTime = performance.now();
      startBGM(); // start bg when game starts
    }

    // ====== INPUT
    function flap() {
      if (gameState === "playing") {
        bird.vy = FLAP_VEL;
      } else {
        startGame();
      }
    }
    canvas.addEventListener("click", flap);
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); flap(); }, { passive:false });
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); flap(); }
    });

    // ====== HELPERS
    function drawCircleImage(img, cx, cy, size, border = true) {
      const r = size / 2;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, cx - r, cy - r, size, size);
      ctx.restore();

      if (border) {
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = Math.max(2, size * 0.06);
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
      const closestX = Math.max(rx, Math.min(cx, rx + rw));
      const closestY = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - closestX;
      const dy = cy - closestY;
      return (dx*dx + dy*dy) <= r*r;
    }

    // ====== BOOK PIPES (pattern anchored to PIPE: NO sliding)
    function spawnPipe() {
      const topH = 70 + Math.random() * 200;
      pipes.push({
        x: WIDTH + 60,
        topH,
        scored: false,
        texYTop: Math.floor(Math.random() * 600),
        texYBot: Math.floor(Math.random() * 600)
      });
    }

    function drawBookPipe(p) {
      const x = p.x;
      const topH = p.topH;
      const botY = topH + GAP;
      const playH = HEIGHT - GROUND_HEIGHT;

      function fillStack(y, h, texY) {
        // shadow
        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.fillRect(x + 6, y + 6, PIPE_W, h);

        if (!booksPattern) {
          ctx.fillStyle = "rgba(0,0,0,0.20)";
          ctx.fillRect(x, y, PIPE_W, h);
        } else {
          ctx.save();
          ctx.beginPath();
          ctx.rect(x, y, PIPE_W, h);
          ctx.clip();

          // ✅ anchor pattern to PIPE rect
          ctx.translate(x, y);
          ctx.translate(0, -texY);

          ctx.fillStyle = booksPattern;
          ctx.fillRect(0, texY, PIPE_W + 200, h + 200);

          ctx.restore();
        }

        // border
        ctx.strokeStyle = "rgba(0,0,0,0.35)";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, PIPE_W, h);

        // highlight edge
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + 2, y + 2);
        ctx.lineTo(x + 2, y + h - 2);
        ctx.stroke();
      }

      fillStack(0, topH, p.texYTop);
      fillStack(botY, playH - botY, p.texYBot);

      // gap lips
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(x - 8, topH - 12, PIPE_W + 16, 12);
      ctx.fillRect(x - 8, botY, PIPE_W + 16, 12);
    }

    // ====== BIRD (bird + face overlay)
    function drawBirdWithFace() {
      const rot = Math.min(Math.max(bird.vy * 0.07, -1.1), 0.6);

      ctx.save();
      ctx.translate(bird.x, bird.y);
      ctx.rotate(rot);

      // body
      const g = ctx.createLinearGradient(-20, -10, 22, 14);
      g.addColorStop(0, "#FFD54A");
      g.addColorStop(1, "#F39C12");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(0, 0, 20, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // wing
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      ctx.beginPath();
      ctx.ellipse(-4, 3, 12, 8, -0.25, 0, Math.PI * 2);
      ctx.fill();

      // beak
      ctx.fillStyle = "#FF7A00";
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(30, -5);
      ctx.lineTo(30, 5);
      ctx.closePath();
      ctx.fill();

      // eye
      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(8, -4, 4.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "black";
      ctx.beginPath();
      ctx.arc(9.5, -4, 2, 0, Math.PI * 2);
      ctx.fill();

      // face overlay
      if (faceImg) drawCircleImage(faceImg, 6, -1, FACE_SIZE, true);

      ctx.restore();
    }

    // ====== STATE CHANGES (stop music)
    function die(reason) {
      gameState = "dead";
      deathReason = reason;
      stopBGM(true); // ✅ stop bgm on death
    }

    function win() {
      gameState = "win";
      stopBGM(true); // ✅ stop bgm on win
    }

    // ====== UPDATE
    function update(deltaMs) {
      if (gameState !== "playing") return;

      const dt = (deltaMs * TARGET_FPS) / 1000;

      // bird
      bird.vy += GRAVITY * dt;
      bird.y += bird.vy * dt;

      // spawn pipes
      if (pipes.length === 0 || pipes[pipes.length - 1].x < WIDTH - 230) spawnPipe();

      // move pipes + collision
      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= SPEED * dt;

        if (p.x < -PIPE_W - 80) {
          pipes.splice(i, 1);
          continue;
        }

        if (!p.scored && p.x + PIPE_W < bird.x) {
          p.scored = true;
          score++;
          if (score > best) best = score;
        }

        const botY = p.topH + GAP;
        const playH = HEIGHT - GROUND_HEIGHT;

        if (
          circleRectCollide(bird.x, bird.y, BIRD_BODY_R, p.x, 0, PIPE_W, p.topH) ||
          circleRectCollide(bird.x, bird.y, BIRD_BODY_R, p.x, botY, PIPE_W, playH - botY)
        ) {
          playSfx("hit");
          die("hit");
          return;
        }
      }

      // fall/top out
      if (bird.y + BIRD_BODY_R > HEIGHT - GROUND_HEIGHT || bird.y - BIRD_BODY_R < 0) {
        playSfx("fall");
        die("fall");
        return;
      }

      // win
      if (score >= WIN_SCORE) {
        playSfx("win");
        win();
      }
    }

    // ====== DRAW
    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT - GROUND_HEIGHT);
      grad.addColorStop(0, "#71C5CF");
      grad.addColorStop(1, "#C6F2F7");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // clouds
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      for (let i = 0; i < 6; i++) {
        const cx = (i * 70 + (Date.now() / 50) % 70) % (WIDTH + 80) - 40;
        const cy = 60 + (i % 3) * 35;
        ctx.beginPath();
        ctx.arc(cx, cy, 18, 0, Math.PI * 2);
        ctx.arc(cx + 18, cy + 4, 16, 0, Math.PI * 2);
        ctx.arc(cx + 34, cy, 14, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawGround() {
      ctx.fillStyle = "#E8D9A9";
      ctx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);
      ctx.fillStyle = "rgba(0,0,0,0.08)";
      for (let x = 0; x < WIDTH; x += 24) ctx.fillRect(x, HEIGHT - 40, 10, 4);
    }

    function drawUI() {
      // score
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#000000";
      ctx.lineWidth = 4;
      ctx.font = "bold 58px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.strokeText(score, WIDTH / 2, 95);
      ctx.fillText(score, WIDTH / 2, 95);

      if (gameState === "playing") return;

      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      if (gameState === "menu") {
        ctx.font = "bold 44px Arial";
        ctx.fillText("BOOK FLAPPY", WIDTH/2, HEIGHT/2 - 120);
        ctx.font = "24px Arial";
        ctx.fillText("Tap / Space to Start", WIDTH/2, HEIGHT/2 + 10);
        ctx.font = "20px Arial";
        ctx.fillText("Music plays only while playing", WIDTH/2, HEIGHT/2 + 48);
      } else if (gameState === "dead") {
        ctx.font = "bold 46px Arial";
        ctx.fillText("GAME OVER", WIDTH/2, HEIGHT/2 - 70);
        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score} | Best: ${best}`, WIDTH/2, HEIGHT/2 - 20);
        ctx.font = "24px Arial";
        ctx.fillText(deathReason === "hit" ? "You hit the books!" : "You fell!", WIDTH/2, HEIGHT/2 + 18);
        ctx.font = "26px Arial";
        ctx.fillText("Tap to Retry", WIDTH/2, HEIGHT/2 + 70);
      } else if (gameState === "win") {
        ctx.font = "bold 50px Arial";
        ctx.fillText("YOU WIN!", WIDTH/2, HEIGHT/2 - 70);
        ctx.font = "bold 30px Arial";
        ctx.fillText(`Score: ${score} | Best: ${best}`, WIDTH/2, HEIGHT/2 - 20);
        ctx.font = "26px Arial";
        ctx.fillText("Tap to Play Again", WIDTH/2, HEIGHT/2 + 70);
      }
    }

    function draw() {
      drawBackground();
      for (const p of pipes) drawBookPipe(p);
      drawGround();
      drawBirdWithFace();
      drawUI();
    }

    // ====== LOOP (crash-proof)
    function loop(now) {
      try {
        const delta = now - lastTime;
        lastTime = now;
        update(delta);
        draw();
      } catch (err) {
        hud.style.display = "block";
        hud.textContent = "Runtime error (game stopped):\n" + (err?.message || err);
        console.error(err);
        return;
      }
      requestAnimationFrame(loop);
    }

    // ====== INIT LOAD
    (async function init() {
      resetGame();

      const [faceRes, booksRes] = await Promise.all([
        loadImage(PATHS.face),
        loadImage(PATHS.books),
      ]);

      const missing = [];
      if (faceRes.ok) faceImg = faceRes.img; else missing.push(faceRes.src);
      if (booksRes.ok) {
        booksImg = booksRes.img;
        booksPattern = ctx.createPattern(booksImg, "repeat");
      } else missing.push(booksRes.src);

      if (missing.length) {
        hud.style.display = "block";
        hud.textContent =
          "Missing assets (still playable):\n" +
          missing.join("\n") +
          "\n\nFix paths exactly.";
      } else {
        hud.textContent = "Ready ✅ Tap / Space to start";
        setTimeout(() => { hud.style.display = "none"; }, 2000);
      }

      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
